<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLS Lead — Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens/tokens.css" />
  <style>
/* ── Reset ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'JetBrains Mono',monospace;background:#EAEAEC;color:#1C1D1F;line-height:1.5}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}

/* ── Shell ────────────────────────────────────────────── */
.shell{display:flex;min-height:100vh;padding:40px}
.sidebar{position:sticky;top:40px;width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:24px;align-self:flex-start;overflow-y:auto;max-height:calc(100vh - 80px);z-index:20}
.main{flex:1;min-width:0;padding:0 0 0 0;display:flex;flex-direction:column}
.main-inner{padding:0 40px;display:flex;flex-direction:column;gap:24px}
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:50;width:40px;height:40px;border:2px solid #1C1D1F;border-radius:8px;background:#EAEAEC;cursor:pointer;align-items:center;justify-content:center;padding:0}
.hamburger svg{width:20px;height:20px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:15}

/* ── Logo ─────────────────────────────────────────────── */
.logo{font-size:0;display:flex;align-items:center;gap:6px;padding:0 0 0 0}
.logo-dls{display:inline-flex;align-items:center;justify-content:center;background:#1C1D1F;color:#fff;font-size:14px;font-weight:800;padding:4px 8px;border-radius:6px;letter-spacing:0.5px}
.logo-lead{font-size:20px;font-weight:400;color:#1C1D1F;font-style:italic}

/* ── Sidebar Nav ──────────────────────────────────────── */
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:16px;font-weight:700;cursor:pointer;border-left:3px solid #EAEAEC;transition:border-color .15s}
.nav-item:hover{border-left-color:#A4A7AE}
.nav-item.active{border-left-color:#1C1D1F}
.nav-item .chevron{width:16px;height:16px;margin-left:auto;transition:transform .2s;flex-shrink:0}
.nav-item .chevron.open{transform:rotate(180deg)}
.nav-children{display:none;flex-direction:column}
.nav-children.open{display:flex}
.nav-child{display:block;padding:6px 16px 6px 32px;font-size:14px;font-weight:600;color:#1C1D1F;border-left:3px solid #EAEAEC;cursor:pointer;transition:border-color .15s}
.nav-child:hover{border-left-color:#A4A7AE}
.nav-child.active{border-left-color:#1C1D1F;background:#EAEAEC}
.nav-child-component{padding:6px 16px 6px 40px;font-size:14px;font-weight:400;color:#1C1D1F;border-left:3px solid transparent;cursor:pointer}
.nav-child-component:hover{background:rgba(0,0,0,.03)}
.nav-child-component.active{border-left-color:#1C1D1F;background:rgba(0,0,0,.04);font-weight:600}

/* ── Header Top Bar ───────────────────────────────────── */
.header-top{display:flex;align-items:center;gap:12px}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid #1C1D1F;border-radius:8px;background:none;font-family:inherit;font-size:14px;font-weight:600;color:#1C1D1F;cursor:pointer;letter-spacing:0.28px;transition:background .15s}
.btn-outline:hover{background:rgba(0,0,0,.04)}
.btn-outline svg,.btn-outline img{width:16px;height:16px}
.header-subtitle{flex:1;font-size:16px;font-weight:600;color:#666970}
.header-btns{display:flex;gap:8px}

/* ── Page Title ───────────────────────────────────────── */
.page-title{font-size:60px;font-weight:800;line-height:72px;color:#1C1D1F}

/* ── Tabs ─────────────────────────────────────────────── */
.tabs{display:flex;gap:24px;height:34px;margin-bottom:16px}
.tab{display:flex;gap:6px;align-items:center;padding:8px 0;font-size:14px;font-weight:600;letter-spacing:0.28px;color:#1C1D1F;border-bottom:3px solid #EAEAEC;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{border-bottom-color:#A4A7AE}
.tab.active{color:#4300F6;border-bottom-color:#4300F6}
.tab.active::before{content:'// ';color:#4300F6}

/* ── Content Card ─────────────────────────────────────── */
.card{background:#fff;border:4px solid #1C1D1F;border-radius:8px;padding:24px}
.card-sm{background:#fff;border:4px solid #1C1D1F;border-radius:8px;padding:12px}

/* ── Content layout ───────────────────────────────────── */
.content-row{display:flex;gap:24px;align-items:flex-start}
.content-main{flex:1;min-width:0}
.content-aside{width:260px;flex-shrink:0}

/* ── Doc sections ─────────────────────────────────────── */
.doc-title{font-size:32px;font-weight:700;line-height:40px;margin-bottom:16px}
.doc-subtitle{font-size:14px;font-weight:400;line-height:18px;color:#666970;margin-bottom:0}
.doc-section-title{font-size:24px;font-weight:500;line-height:32px;margin:24px 0 16px}
.doc-block-title{font-size:18px;font-weight:600;line-height:26px;margin-bottom:8px;color:#181D27}
.doc-text{font-size:14px;font-weight:400;line-height:18px;color:#1C1D1F;white-space:pre-wrap}
.doc-rule{font-size:12px;font-weight:600;line-height:16px;color:#666970;margin-top:8px}
.doc-block+.doc-block{margin-top:16px}

/* ── TOC sidebar ──────────────────────────────────────── */
.toc-item{display:flex;align-items:center;padding:12px 12px 12px 16px;font-size:14px;font-weight:600;letter-spacing:0.28px;cursor:pointer;border-left:4px solid transparent;transition:background .15s}
.toc-item:hover{background:#f5f5f5}
.toc-item.active{background:#EAEAEC;border-left-color:#1C1D1F}

/* ── Changelog ────────────────────────────────────────── */
.changelog-entry{margin-bottom:24px}
.changelog-date{font-size:24px;font-weight:500;line-height:32px;color:#181D27}
.changelog-desc{font-size:14px;font-weight:400;line-height:18px;margin-top:8px}
.changelog-sub{font-size:18px;font-weight:600;line-height:26px;margin-top:16px}
.changelog-list{padding-left:24px;margin-top:8px}
.changelog-list li{list-style:disc;font-size:14px;font-weight:400;line-height:18px;margin-bottom:4px}
.code-block{background:#FAFAFA;border:1px solid #EAEAEC;border-radius:8px;overflow:hidden;margin-top:16px}
.code-block-header{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid #EAEAEC;font-size:12px;font-weight:600;color:#1C1D1F}
.code-block-header .file-icon{width:16px;height:16px;color:#666970}
.code-block-header .filename{flex:1}
.code-block-header .copy-btn{width:16px;height:16px;cursor:pointer;color:#666970}
.code-block-body{padding:12px;font-size:12px;font-weight:600;line-height:16px;color:#666970}
.code-block-body .line-del{color:#D60202}
.code-block-body .line-add{color:#4E9C48}

/* ── Additional colors 2-col layout ──────────────────── */
.additional-pair{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:8px}
@media(max-width:768px){.additional-pair{grid-template-columns:1fr}}

/* ── Components grid ──────────────────────────────────── */
.comp-grid{display:grid;grid-template-columns:repeat(4,1fr);text-align:center}
.comp-cell{padding:14px 8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;border-radius:0;transition:border-color .15s}
.comp-cell:hover{background:#f5f5f5}
.comp-cell.active{border:2px solid #1C1D1F;border-radius:8px}

/* ── Alert preview ────────────────────────────────────── */
.alert-preview{display:flex;flex-direction:column;gap:12px;padding:24px}
.alert-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px}
.alert-row .alert-icon{width:20px;height:20px;flex-shrink:0}
.alert-row .alert-content{flex:1}
.alert-row .alert-title{font-weight:600;line-height:20px}
.alert-row .alert-desc{font-weight:400;color:inherit;opacity:.8;line-height:20px}
.alert-row .alert-btn{padding:6px 14px;border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;border:none;cursor:pointer;color:#fff}

/* ── Token tables (reused) ────────────────────────────── */
.section-heading{font-size:28px;font-weight:700;margin-bottom:6px;color:#1C1D1F}
.section-desc{font-size:14px;color:#666970;margin-bottom:24px;max-width:680px}
.subsection{margin-bottom:32px}
.subsection-title{font-size:16px;font-weight:600;margin-bottom:12px;color:#252B37}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:2px}
.color-card{overflow:hidden;background:#fff;border:1px solid #D5D7DA;cursor:pointer;transition:transform .15s}
.color-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.color-swatch{height:64px;position:relative}
.color-swatch.checker{background-image:linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0}
.color-swatch .fill{position:absolute;inset:0}
.color-info{padding:8px}
.color-name{font-size:11px;font-weight:600;color:#414651;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.color-hex{font-size:11px;color:#A4A7AE}
.token-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #D5D7DA}
.token-table th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#A4A7AE;padding:8px 12px;border-bottom:2px solid #D5D7DA}
.token-table td{padding:10px 12px;border-bottom:1px solid #E9EAEB;font-size:13px;background:#fff}
.token-table tr:hover td{background:#FAFAFA}
.token-table .mono{font-size:12px;color:#252B37}
.token-table .css-var{font-size:11px;color:#535862}
.token-table .ref{font-size:12px;color:#535862}
.token-table .desc{font-size:12px;color:#A4A7AE}
.token-cell{display:flex;align-items:center;gap:10px}
.swatch{width:28px;height:28px;border-radius:6px;display:inline-block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);flex-shrink:0}
.spacing-bar{height:20px;background:#7F56D9;border-radius:4px;min-width:2px}
.radius-box{width:48px;height:48px;background:#7F56D9}

/* ── Footer ───────────────────────────────────────────── */
.footer{display:flex;gap:40px;align-items:flex-start;padding-top:24px}
.footer-links{display:flex;flex-direction:column;gap:12px;font-size:14px;font-weight:600;letter-spacing:0.28px;width:130px}
.footer-links a{cursor:pointer}
.footer-links a:hover{text-decoration:underline}
.footer-info{flex:1;font-size:14px;font-weight:400;color:#666970;line-height:18px}
.footer-social{display:flex;gap:8px;align-items:center}
.social-icon{width:40px;height:40px;border-radius:9999px;background:#D5D7DA;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.social-icon:hover{background:#A4A7AE}
.social-icon svg{width:20px;height:20px}

/* ── Toast ────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1C1D1F;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;pointer-events:none;opacity:0;transition:transform .25s ease,opacity .25s ease;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Dark mode ────────────────────────────────────────── */
[data-theme="dark"] body{background:#181D27;color:#E9EAEB}
[data-theme="dark"] .shell{background:#181D27}
[data-theme="dark"] .card,[data-theme="dark"] .card-sm{background:#252B37;border-color:#535862}
[data-theme="dark"] .nav-item{border-left-color:#252B37}
[data-theme="dark"] .nav-item.active{border-left-color:#E9EAEB}
[data-theme="dark"] .nav-child{border-left-color:#252B37;color:#E9EAEB}
[data-theme="dark"] .nav-child.active{border-left-color:#E9EAEB;background:#252B37}
[data-theme="dark"] .tab{color:#E9EAEB;border-bottom-color:#252B37}
[data-theme="dark"] .page-title{color:#E9EAEB}
[data-theme="dark"] .section-heading{color:#E9EAEB}
[data-theme="dark"] .subsection-title{color:#D5D7DA}
[data-theme="dark"] .color-card{background:#252B37;border-color:#414651}
[data-theme="dark"] .color-name{color:#D5D7DA}
[data-theme="dark"] .token-table{background:#252B37;border-color:#414651}
[data-theme="dark"] .token-table th{border-bottom-color:#414651;color:#535862}
[data-theme="dark"] .token-table td{border-bottom-color:#252B37;background:#252B37}
[data-theme="dark"] .token-table tr:hover td{background:#181D27}
[data-theme="dark"] .token-table .mono{color:#E9EAEB}
[data-theme="dark"] .doc-title,.doc-block-title{color:#E9EAEB}
[data-theme="dark"] .toc-item.active{background:#414651}
[data-theme="dark"] .comp-cell:hover{background:#252B37}
[data-theme="dark"] .code-block{background:#252B37;border-color:#414651}
[data-theme="dark"] .code-block-header{border-bottom-color:#414651;color:#E9EAEB}
[data-theme="dark"] .hamburger{background:#252B37;border-color:#E9EAEB;color:#E9EAEB}
[data-theme="dark"] .sidebar-backdrop{background:rgba(0,0,0,.6)}

/* ── Tablet (≤1024px) ─────────────────────────────────── */
@media(max-width:1024px){
  .shell{padding:24px}
  .main-inner{padding:0 24px}
  .page-title{font-size:42px;line-height:52px}
  .content-aside{width:200px}
  .header-subtitle{display:none}
  .comp-grid{grid-template-columns:repeat(3,1fr)}
  .token-table{font-size:12px}
  .token-table td,.token-table th{padding:8px}
}

/* ── Mobile (≤768px) ──────────────────────────────────── */
@media(max-width:768px){
  .shell{flex-direction:column;padding:0}
  .hamburger{display:flex}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#EAEAEC;padding:60px 16px 24px;z-index:30;transform:translateX(-100%);transition:transform .25s ease;max-height:100vh;top:0;border-radius:0}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.open{display:block}
  .main{padding-top:56px}
  .main-inner{padding:0 16px}
  .page-title{font-size:32px;line-height:40px}
  .header-top{flex-wrap:wrap;gap:8px}
  .header-btns{flex-wrap:wrap;gap:6px}
  .btn-outline{padding:8px 10px;font-size:12px}
  .header-subtitle{display:none}
  .tabs{gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{font-size:13px}
  .card{padding:16px;border-width:3px}
  .card-sm{padding:10px;border-width:3px}
  .content-row{flex-direction:column}
  .content-aside{width:100%}
  .color-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:1px}
  .color-swatch{height:52px}
  .color-info{padding:6px}
  .color-name{font-size:10px}
  .color-hex{font-size:10px}
  .comp-grid{grid-template-columns:repeat(2,1fr)}
  .comp-cell{padding:10px 6px;font-size:13px}
  .token-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .token-table thead,.token-table tbody,.token-table tr{display:table;width:100%;table-layout:auto}
  .token-table td,.token-table th{padding:6px 8px;font-size:11px;white-space:nowrap}
  .footer{flex-direction:column;gap:24px}
  .footer-links{flex-direction:row;flex-wrap:wrap;gap:8px 16px;width:100%}
  .footer-social{order:-1}
  .doc-title{font-size:24px;line-height:32px}
  .doc-section-title{font-size:20px}
  .doc-block-title{font-size:16px}
  .section-heading{font-size:22px}
  .alert-row{flex-wrap:wrap;gap:8px}
  .alert-row .alert-btn{width:100%}
}

/* ── Small mobile (≤480px) ────────────────────────────── */
@media(max-width:480px){
  .page-title{font-size:26px;line-height:34px}
  .color-grid{grid-template-columns:repeat(auto-fill,minmax(60px,1fr))}
  .color-swatch{height:44px}
  .btn-outline span{display:none}
  .comp-grid{grid-template-columns:repeat(2,1fr)}
}
  </style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="Menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <p style="color:#666970;font-size:14px;padding:40px">Loading...</p>
  </main>
</div>

<div class="toast" id="toast">Copied!</div>

/* ═══════ Utils ═══════════════════════════════════════════ */
function h(tag,attrs={},...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else if(k==='html'){el.innerHTML=v}
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(typeof c==='string')el.appendChild(document.createTextNode(c));
    else if(c)el.appendChild(c);
  }
  return el;
}
function copyToast(text){
  navigator.clipboard.writeText(text);
  const t=$('#toast');t.textContent=`Copied: ${text}`;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
function resolveRef(val){
  if(!val||typeof val!=='string')return val;
  const cm=val.match(/^\{color\.(.+)\}$/);
  if(cm){const k=cm[1];if(primitiveMap[k])return primitiveMap[k];if(semanticRefMap[k])return resolveRef(semanticRefMap[k]);return val;}
  const sm=val.match(/^\{state\.(.+)\}$/);
  if(sm&&semanticRefMap['state.'+sm[1]])return resolveRef(semanticRefMap['state.'+sm[1]]);
  return val;
}
function isRgba(v){return v&&v.startsWith('rgba')}

/* ═══════ Build token maps ════════════════════════════════ */
const PRIM_KEYS=['neutral','primary','info','success','warning','danger','additional','opacity'];
function buildMaps(t){
  primitiveMap={};semanticRefMap={};
  function walkP(obj,pre){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;if(!PRIM_KEYS.includes(pre.split('.')[0])&&pre)return;if(v&&v.$value!==undefined&&typeof v.$value==='string'&&(v.$value.startsWith('#')||v.$value.startsWith('rgba'))){primitiveMap[pre+k]=v.$value}else if(typeof v==='object'&&v!==null&&!v.$value){walkP(v,pre+k+'.')}}}
  for(const k of PRIM_KEYS)if(t.color[k])walkP(t.color[k],k+'.');
  function walkS(obj,pre){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;const p=pre?pre+'.'+k:k;if(v&&v.$value&&typeof v.$value==='string'){semanticRefMap[p]=v.$value}else if(typeof v==='object'&&v!==null&&!Array.isArray(v)&&!v.$type){walkS(v,p)}}}
  for(const k of['surface','text','border','intent','overlay'])if(t.color[k])walkS(t.color[k],k);
  if(t.color.component)walkS(t.color.component,'component');
  if(t.state){(function ws(obj,pre){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;const p=pre?pre+'.'+k:k;if(v&&v.$value!==undefined&&typeof v.$value==='string')semanticRefMap['state.'+p]=v.$value;else if(typeof v==='object'&&v!==null&&!v.$type)ws(v,p)}})(t.state,'')}
}

  card.appendChild(h('div',{class:'doc-title'},'Token Architecture'));
  card.appendChild(h('div',{class:'doc-subtitle'},'DLS-Lead uses a 4-layer DTCG-compliant token system. Every visual decision is encoded as a design token. Components consume tokens \u2014 they never hardcode values.'));

  // 4-Layer Model
  card.appendChild(h('div',{class:'doc-section-title'},'4-Layer Model'));

  const layers=[
    {title:'Layer 1 \u2014 Primitives',text:'Raw values: hex colors, pixel dimensions, font weights, numeric scales.\n\nExamples:\ncolor.neutral.700 \u2192 #414651\nradius.m \u2192 6px\nspacing.4 \u2192 16px\ntext.m.fontSize \u2192 14px',rule:'Rule: NEVER referenced directly by components.'},
    {title:'Layer 2 \u2014 System Semantics',text:'UI roles mapped from primitives. Define meaning, not appearance.\n\nExamples:\ncolor.surface.base \u2192 {color.neutral.0}\ncolor.text.primary \u2192 {color.neutral.900}\ncolor.intent.primary.base \u2192 {color.primary.700}\ncolor.border.focus \u2192 {color.neutral.700}',rule:'Used by components when no Layer 4 token exists.'},
    {title:'Layer 3 \u2014 State Abstraction',text:'Behavioral modifiers independent of brand color.\n\nCode: OKLCH lightness shift\nstate.lDelta.hover \u2192 -0.05\nstate.lDelta.pressed \u2192 -0.10\n\nFigma: opacity overlays\nstate.overlay.hover.light \u2192 rgba(0,0,0,0.05)\nstate.overlay.pressed.light \u2192 rgba(0,0,0,0.10)\n\nstate.disabled.opacity \u2192 0.38\nstate.focus.ring.color \u2192 {color.info.300}'},
    {title:'Layer 4 \u2014 Component Tokens',text:'Override-safe, per-component values. Primary source for all component CSS.\n\nExamples:\ncolor.component.button.primary.bg.base\ncolor.component.badge.danger.fg\nradius.component.card \u2192 {radius.xl} (12px)\nradius.component.button \u2192 {radius.m} (6px)',rule:'Components MUST use Layer 4 tokens first.'},
  ];
  for(const l of layers){

    blk.appendChild(h('div',{class:'doc-text'},l.text));

    card.appendChild(blk);
  }

  card.appendChild(h('div',{class:'doc-section-title'},'Dependency Rules'));
  const rules=[
    {title:'Reference Direction',text:'References flow downward only:\n\nLayer 4 \u2192 can reference Layers 3, 2, 1\nLayer 3 \u2192 can reference Layers 2, 1\nLayer 2 \u2192 can reference Layer 1 only\nLayer 1 \u2192 raw values only, no references\n\nA lower layer MUST NOT reference a higher layer.'},
    {title:'Component Lookup Order',text:'1. Check: does --dls-color-component-{name}-{property}-{state} exist? \u2192 Use it.\n2. Check: does --dls-color-{semantic}-{role} exist? \u2192 Use it.\n3. No match? \u2192 Request a new token. Do NOT hardcode.',rule:'This order is mandatory for both human developers and AI agents.'},
    {title:'Anti-Patterns',text:'\u2717 Using #hex or rgb() values in component CSS\n\u2717 Referencing color.neutral.700 (primitive) in a component\n\u2717 Referencing color.intent.primary.base when color.component.button.primary.bg.base exists\n\u2717 Hardcoding state shift values instead of using state.lDelta tokens\n\u2717 Layer 4 token referencing another Layer 4 token'},
  ];
  for(const r of rules){
    const blk=h('div',{class:'doc-block'});
    blk.appendChild(h('div',{class:'doc-block-title'},r.title));
    blk.appendChild(h('div',{class:'doc-text'},r.text));

  }
  row.appendChild(aside);
  inner.appendChild(row);

}

/* ═══════ Router dispatch ═════════════════════════════════ */
function renderPage(){
  const route=getRoute();
  if(route.startsWith('changelog'))renderChangelog();
  else if(route.startsWith('documentation'))renderDocumentation();
  else if(route==='components')renderComponentsIndex();
  else if(route.startsWith('components/'))renderComponentDetail(route.split('/')[1]);
  else if(route.startsWith('tokens/color'))renderTokensColor();
  else if(route.startsWith('tokens/shadow'))renderTokensShadow();
  else if(route.startsWith('tokens/typography'))renderTokensTypography();
  else if(route.startsWith('tokens/layout')||route.startsWith('tokens/space'))renderTokensLayout();
  else renderDocumentation();
  window.scrollTo(0,0);
}

/* ═══════ Init ════════════════════════════════════════════ */
async function init(){
  const res=await fetch('/tokens/tokens.json');
  tokens=await res.json();
  buildMaps(tokens);
  renderSidebar();
  renderPage();
}
init();
