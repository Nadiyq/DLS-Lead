<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLS Lead — Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens/tokens.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
/* ── Reset ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'JetBrains Mono',monospace;background:#EAEAEC;color:#1C1D1F;line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}

/* ── Shell ────────────────────────────────────────────── */
.app-frame{min-height:100vh;padding:40px;display:flex;flex-direction:column;gap:24px}
.app-header,.app-footer{flex-shrink:0}
.shell{display:flex;flex:1;min-height:0}
.sidebar{position:sticky;top:0;width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:24px;align-self:flex-start;overflow-y:auto;max-height:100vh;z-index:20}
.main{flex:1;min-width:0;padding:0 0 0 0;display:flex;flex-direction:column}
.main-inner{padding:0 40px;display:flex;flex-direction:column;gap:24px}
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:50;width:40px;height:40px;border:2px solid #1C1D1F;border-radius:40px;background:#EAEAEC;cursor:pointer;align-items:center;justify-content:center;padding:0}
.hamburger svg{width:20px;height:20px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:15}

/* ── Logo ─────────────────────────────────────────────── */
.logo{font-size:0;display:flex;align-items:center;flex-shrink:0;padding:0;text-decoration:none}
.logo img{display:block;height:31px;width:127px;max-width:none}
.logo-meta{font-size:16px;font-weight:600;line-height:24px;color:#666970;white-space:nowrap}

/* ── Sidebar Nav ──────────────────────────────────────── */
.sidebar-nav{display:flex;flex-direction:column;align-items:stretch;width:100%}
.nav-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;border-left:2px solid #EAEAEC;font-size:16px;font-weight:700;line-height:24px;color:#1C1D1F;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.nav-item:hover{background:#FAFAFA;border-left-color:#EAEAEC}
.nav-item.active{border-left-color:#1C1D1F}
.nav-item .chevron{width:16px;height:16px;margin-left:auto;flex-shrink:0;transition:transform .2s}
.nav-item .chevron.open{transform:rotate(180deg)}
.nav-children{display:none;flex-direction:column;gap:4px;padding:8px 16px;width:100%}
.nav-children.open{display:flex}
.nav-child,.nav-child-component{display:flex;align-items:center;width:100%;padding:11px 16px;border:2px solid #EAEAEC;border-radius:8px;background:transparent;font-size:14px;font-weight:400;line-height:18px;color:#1C1D1F;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.nav-child:hover,.nav-child-component:hover{background:#FAFAFA;border-color:#EAEAEC}
.nav-child.active,.nav-child-component.active{border-color:#1C1D1F}
.nav-child.active:hover,.nav-child-component.active:hover{border-color:#EAEAEC}

/* ── Header Top Bar ───────────────────────────────────── */
.header-top{display:flex;align-items:center;gap:24px;min-height:40px}
.header-brand{display:flex;align-items:center;flex-shrink:0}
.header-nav{display:flex;flex:1 1 auto;align-items:center;gap:24px;min-width:0}
.btn-outline{display:inline-flex;align-items:center;align-self:flex-start;gap:8px;padding:9px 12px;border:2px solid #1C1D1F;border-radius:8px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;line-height:18px;letter-spacing:0.28px;color:#1C1D1F;cursor:pointer;box-shadow:none;transition:background .15s ease,border-color .15s ease,color .15s ease}
.btn-outline:hover{background:#CFD0D3;transform:none}
.btn-outline svg,.btn-outline img{width:16px;height:16px;flex-shrink:0}
.header-subtitle{flex:1 1 auto;font-size:16px;font-weight:600;line-height:24px;color:#666970;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btns{display:flex;align-items:center;gap:8px;flex-shrink:0}
.header-action{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border:none;border-radius:8px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;line-height:18px;letter-spacing:0.28px;color:#1C1D1F;cursor:pointer;transition:background .15s ease}
.header-action:hover{background:#CFD0D3}
.header-action svg,.header-action img{width:16px;height:16px;flex-shrink:0}
.header-action span{white-space:nowrap}
.header-theme{display:inline-flex;align-items:center;gap:7px;height:40px;padding:4px 16px 4px 4px;border:2px solid #1C1D1F;border-radius:23px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;line-height:18px;letter-spacing:0.28px;color:#1C1D1F;cursor:pointer;transition:background .15s ease,border-color .15s ease,color .15s ease}
.header-theme:hover{background:rgba(207,208,211,.35)}
.header-theme svg{width:16px;height:16px}
.theme-knob{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:999px;background:#CFD0D3;color:#1C1D1F;flex-shrink:0}
.theme-label{white-space:nowrap}

/* ── Page Title ───────────────────────────────────────── */
.page-title{font-size:60px;font-weight:800;line-height:72px;color:#1C1D1F}

/* ── Tabs ─────────────────────────────────────────────── */
.tabs{display:flex;gap:24px;height:34px;margin-bottom:16px}
.tab{display:flex;gap:6px;align-items:center;padding:8px 0;font-size:14px;font-weight:600;letter-spacing:0.28px;color:#1C1D1F;border-bottom:3px solid #EAEAEC;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{border-bottom-color:#A4A7AE}
.tab.active{color:#4300F6;border-bottom-color:#4300F6}
.tab.active::before{content:'// ';color:#4300F6}

/* ── Content Card ─────────────────────────────────────── */
.card{background:#fff;border:4px solid #1C1D1F;border-radius:8px;padding:24px}
.card-sm{background:#fff;border:4px solid #1C1D1F;border-radius:8px;padding:12px}

/* ── Content layout ───────────────────────────────────── */
.content-row{display:flex;gap:24px;align-items:flex-start}
.content-main{flex:1;min-width:0}
.content-aside{width:260px;flex-shrink:0}

/* ── Doc sections ─────────────────────────────────────── */
.doc-title{font-size:32px;font-weight:700;line-height:40px;margin-bottom:16px;color:#1C1D1F}
.doc-subtitle{font-size:14px;font-weight:400;line-height:18px;color:#666970;margin-bottom:0}
.doc-section-title{font-size:24px;font-weight:500;line-height:32px;margin:24px 0 16px;color:#1C1D1F;scroll-margin-top:120px}
.doc-block-title{font-size:18px;font-weight:600;line-height:26px;margin-bottom:8px;color:#1C1D1F}
.doc-text{font-size:14px;font-weight:400;line-height:18px;color:#535862;white-space:pre-wrap}
.doc-rule{font-size:12px;font-weight:600;line-height:16px;color:#717680;margin-top:8px}
.doc-block+.doc-block{margin-top:16px}

/* ── TOC sidebar ──────────────────────────────────────── */
.toc-item{display:flex;align-items:center;justify-content:flex-start;width:100%;padding:12px 12px 12px 16px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;line-height:20px;letter-spacing:0.28px;cursor:pointer;border:none;border-left:4px solid transparent;background:transparent;color:#666970;text-align:left;appearance:none;-webkit-appearance:none;transition:background .15s,color .15s,border-color .15s}
.toc-item:hover{background:#f5f5f5;color:#1C1D1F}
.toc-item.active{background:#EAEAEC;border-left-color:#1C1D1F;color:#1C1D1F}

/* ── Changelog ────────────────────────────────────────── */
.changelog-entry{margin-bottom:24px;scroll-margin-top:120px}
.changelog-date{font-size:24px;font-weight:500;line-height:32px;color:#181D27}
.changelog-desc{font-size:14px;font-weight:400;line-height:18px;margin-top:8px;color:#535862}
.changelog-sub{font-size:18px;font-weight:600;line-height:26px;margin-top:16px}
.changelog-list{padding-left:24px;margin-top:8px}
.changelog-list li{list-style:disc;font-size:14px;font-weight:400;line-height:18px;margin-bottom:4px}
.code-block{background:#FAFAFA;border:1px solid #EAEAEC;border-radius:8px;overflow:hidden;margin-top:16px}
.code-block-header{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid #EAEAEC;font-size:12px;font-weight:600;color:#1C1D1F}
.code-block-header .file-icon{width:16px;height:16px;color:#666970}
.code-block-header .filename{flex:1}
.code-block-header .copy-btn{width:16px;height:16px;cursor:pointer;color:#666970}
.code-block-body{padding:12px;font-size:12px;font-weight:600;line-height:16px;color:#666970}
.code-block-body .line-del{color:#D60202}
.code-block-body .line-add{color:#4E9C48}

/* ── Additional colors 2-col layout ──────────────────── */
.additional-pair{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:8px}
@media(max-width:768px){.additional-pair{grid-template-columns:1fr}}

/* ── Components grid ──────────────────────────────────── */
.comp-grid{display:grid;grid-template-columns:repeat(4,1fr);text-align:center}
.comp-cell{padding:14px 8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;border-radius:0;transition:border-color .15s}
.comp-cell:hover{background:#f5f5f5}
.comp-cell.active{border:2px solid #1C1D1F;border-radius:8px}

/* ── Alert preview ────────────────────────────────────── */
.alert-preview{display:flex;flex-direction:column;gap:12px;padding:24px}
.alert-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px}
.alert-row .alert-icon{width:20px;height:20px;flex-shrink:0}
.alert-row .alert-content{flex:1}
.alert-row .alert-title{font-weight:600;line-height:20px}
.alert-row .alert-desc{font-weight:400;color:inherit;opacity:.8;line-height:20px}
.alert-row .alert-btn{padding:6px 14px;border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;border:none;cursor:pointer;color:#fff}

/* ── Token tables (reused) ────────────────────────────── */
.section-heading{font-size:32px;font-weight:700;line-height:40px;margin:0;color:#1C1D1F}
.section-desc{font-size:14px;line-height:18px;color:#666970;margin:0;max-width:1020px}
.subsection{margin-bottom:32px}
.subsection-title{border-left:3px solid #1C1D1F;padding-left:16px;font-size:18px;font-weight:600;line-height:26px;margin:0;color:#1C1D1F}
.token-page-content{display:flex;flex-direction:column;gap:40px;margin-top:40px}
.token-page-section{display:flex;flex-direction:column;gap:24px}
.token-page-header{display:flex;flex-direction:column;gap:16px}
.token-table-group{display:flex;flex-direction:column;gap:16px}
.table-scroll{display:block;width:100%;overflow:visible}
.table-scroll .token-table{width:100%}
.component-page-content{display:flex;flex-direction:column;gap:32px;margin-top:40px}
.component-preview-shell{border:2px solid #1C1D1F;border-radius:8px;background:transparent;overflow:hidden}
.color-page-content{display:flex;flex-direction:column;gap:40px;margin-top:40px}
.color-page-section{display:flex;flex-direction:column;gap:24px}
.color-page-heading{display:flex;flex-direction:column;gap:16px}
.color-page-title{font-size:32px;font-weight:700;line-height:40px;color:#1C1D1F}
.color-page-desc{font-size:14px;font-weight:400;line-height:18px;color:#666970;max-width:1020px}
.color-page-columns{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}
.token-scale-group{display:flex;flex-direction:column;gap:16px}
.token-scale-title{border-left:3px solid #1C1D1F;padding-left:16px;font-size:18px;font-weight:600;line-height:26px;color:#1C1D1F}
.token-scale-shell{width:100%;min-width:0}
.token-scale-board{display:grid;align-items:stretch;width:100%;border:2px solid #1C1D1F;padding:2px;background:#1C1D1F;min-width:0}
.color-swatch-card{display:flex;flex-direction:column;min-width:0;background:#1C1D1F;border-right:1px solid rgba(255,255,255,.2);border-bottom:1px solid rgba(255,255,255,.2)}
.color-swatch-card:last-child{border-right:none}
.color-swatch-surface{height:64px;position:relative;overflow:hidden}
.color-swatch-surface.checker{background-color:#f3f4f6;background-image:linear-gradient(45deg,#8e8e93 25%,transparent 25%),linear-gradient(-45deg,#8e8e93 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#c7c7cc 75%),linear-gradient(-45deg,transparent 75%,#c7c7cc 75%);background-size:28px 28px;background-position:0 0,0 14px,14px -14px,-14px 0}
.color-swatch-surface .fill{position:absolute;inset:0}
.color-swatch-meta{display:flex;flex-direction:column;gap:4px;padding:9px 8px 8px;border-top:1px solid rgba(255,255,255,.2);background:#1C1D1F}
.color-swatch-token{font-size:10px;font-weight:600;line-height:14px;letter-spacing:.02em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-swatch-value{font-size:10px;font-weight:400;line-height:14px;letter-spacing:.02em;color:#CFD0D3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.token-table.color-token-table{width:100%;table-layout:fixed;border-collapse:separate;border-spacing:0;border:2px solid #1C1D1F;border-radius:8px;background:transparent;overflow:hidden}
.token-table.color-token-table col.swatch-col{width:48px}
.token-table.color-token-table col.token-col{width:260px}
.token-table.color-token-table col.reference-col{width:auto}
.token-table.color-token-table col.resolved-col{width:100px}
.token-table.color-token-table col.css-col{width:280px}
.token-table.color-token-table col.desc-col{width:280px}
.token-table.color-token-table th,.token-table.color-token-table td{vertical-align:middle;background:transparent;white-space:normal;word-break:break-word}
.token-table.color-token-table th{padding:8px 12px 9px;border-bottom:1px solid #B4B6BB;font-size:10px;font-weight:600;line-height:14px;letter-spacing:.02em;color:#1C1D1F;text-transform:none}
.token-table.color-token-table td{padding:8px 12px 9px;border-bottom:1px solid rgba(28,29,31,.12);font-size:10px;line-height:14px;color:#666970}
.token-table.color-token-table tbody tr:last-child td{border-bottom:none}
.token-table.color-token-table tr:hover td{background:transparent}
.token-table.color-token-table td.swatch-cell{padding-top:8px;padding-bottom:8px}
.token-table.color-token-table .mono,.token-table.color-token-table .ref,.token-table.color-token-table .css-var,.token-table.color-token-table .desc{font-size:10px;line-height:14px;letter-spacing:.02em}
.token-table.color-token-table .mono{font-weight:600;color:#1C1D1F;white-space:nowrap;word-break:normal}
.token-table.color-token-table .ref,.token-table.color-token-table .css-var,.token-table.color-token-table .desc{font-weight:400;color:#666970}
.token-table.color-token-table .swatch{width:24px;height:24px;border-radius:0;border:2px solid #666970;box-shadow:none;display:block}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:2px}
.color-card{overflow:hidden;background:#fff;border:1px solid #D5D7DA;cursor:pointer;transition:transform .15s}
.color-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.color-swatch{height:64px;position:relative}
.color-swatch.checker{background-image:linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0}
.color-info{padding:8px}
.color-name{font-size:11px;font-weight:600;color:#414651;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.color-hex{font-size:11px;color:#A4A7AE}
.token-table{width:100%;border-collapse:separate;border-spacing:0;background:transparent;border-radius:8px;overflow:hidden;border:2px solid #1C1D1F}
.token-table th,.token-table td{vertical-align:middle;background:transparent;white-space:normal;word-break:break-word}
.token-table th{text-align:left;font-size:10px;font-weight:600;text-transform:none;letter-spacing:.02em;line-height:14px;color:#1C1D1F;padding:8px 12px 9px;border-bottom:1px solid #B4B6BB}
.token-table td{padding:8px 12px 9px;border-bottom:1px solid rgba(28,29,31,.12);font-size:10px;line-height:14px;background:transparent;color:#666970}
.token-table tbody tr:last-child td{border-bottom:none}
.token-table tr:hover td{background:transparent}
.token-table .mono,.token-table .css-var,.token-table .ref,.token-table .desc{font-size:10px;line-height:14px;letter-spacing:.02em}
.token-table .mono{font-weight:600;color:#1C1D1F}
.token-table .css-var,.token-table .ref,.token-table .desc{font-weight:400;color:#666970}
.token-cell{display:flex;align-items:center;gap:10px}
.swatch{width:24px;height:24px;border-radius:0;display:block;border:2px solid #666970;box-shadow:none;flex-shrink:0}
.spacing-bar{height:20px;background:#7F56D9;border-radius:4px;min-width:2px}
.radius-box{width:48px;height:48px;background:#7F56D9}

/* ── Footer ───────────────────────────────────────────── */
.footer{border-top:2px solid #CFD0D3;padding:42px 0 40px}
.footer-top{display:grid;grid-template-columns:220px 220px minmax(0,1fr);gap:24px;align-items:start;padding:24px 0}
.footer-logo{display:flex;align-items:flex-start}
.footer-logo img{display:block;width:127px;height:31px;max-width:none}
.footer-links{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.footer-link{font-size:14px;font-weight:400;line-height:18px;color:#666970;text-decoration:none;text-underline-offset:2px;transition:color .15s ease}
.footer-link:hover{color:#1C1D1F}
.footer-info{display:flex;flex-direction:column;gap:16px;align-items:flex-start;justify-content:normal;min-height:100%;font-size:14px;font-weight:400;line-height:18px;color:#666970}
.footer-email{color:#4300F6}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:25px 0 24px;border-top:1px solid #EAEAEC}
.footer-copy{font-size:14px;font-weight:600;line-height:18px;letter-spacing:0.28px;color:#999CA3}
.footer-social{display:flex;gap:16px;align-items:center}
.social-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px;color:#1C1D1F;transition:opacity .15s ease,color .15s ease}
.social-icon:hover{opacity:.72}
.social-icon svg{width:24px;height:24px}

/* ── Toast ────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1C1D1F;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;pointer-events:none;opacity:0;transition:transform .25s ease,opacity .25s ease;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Dark mode ────────────────────────────────────────── */
[data-theme="dark"] body{background:#1C1D1F;color:#FFFFFF}
[data-theme="dark"] .app-frame,[data-theme="dark"] .shell{background:#1C1D1F}
[data-theme="dark"] .card,[data-theme="dark"] .card-sm{background:#1C1D1F;border-color:#666970}
[data-theme="dark"] .nav-item{border-left-color:#1C1D1F;color:#FFFFFF}
[data-theme="dark"] .nav-item.active{border-left-color:#FFFFFF}
[data-theme="dark"] .nav-item:hover{background:#666970;border-left-color:#1C1D1F}
[data-theme="dark"] .nav-child,[data-theme="dark"] .nav-child-component{border-color:#1C1D1F;color:#FFFFFF}
[data-theme="dark"] .nav-child:hover,[data-theme="dark"] .nav-child-component:hover{background:#666970;border-color:#1C1D1F}
[data-theme="dark"] .nav-child.active,[data-theme="dark"] .nav-child-component.active{border-color:#FFFFFF}
[data-theme="dark"] .nav-child.active:hover,[data-theme="dark"] .nav-child-component.active:hover{border-color:#1C1D1F}
[data-theme="dark"] .tab{color:#FFFFFF;border-bottom-color:#1C1D1F}
[data-theme="dark"] .tab:hover{border-bottom-color:#1C1D1F}
[data-theme="dark"] .tab.active{color:#C9B4FF;border-bottom-color:#C9B4FF}
[data-theme="dark"] .tab.active::before{color:#C9B4FF}
[data-theme="dark"] .page-title{color:#FFFFFF}
[data-theme="dark"] .section-heading{color:#FFFFFF}
[data-theme="dark"] .section-desc{color:#FAFAFA}
[data-theme="dark"] .subsection-title{border-left-color:#FFFFFF;color:#FFFFFF}
[data-theme="dark"] .color-page-title{color:#FFFFFF}
[data-theme="dark"] .color-page-desc{color:#FAFAFA}
[data-theme="dark"] .token-scale-title{border-left-color:#FFFFFF;color:#FFFFFF}

/* ═══════ Utils ═══════════════════════════════════════════ */
function h(tag,attrs={},...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else if(k==='html'){el.innerHTML=v}
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(typeof c==='string')el.appendChild(document.createTextNode(c));
    else if(c)el.appendChild(c);
  }
  return el;
}
function copyToast(text){
  navigator.clipboard.writeText(text);
  const t=$('#toast');t.textContent=`Copied: ${text}`;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
function resolveRef(val){
  if(!val||typeof val!=='string')return val;
  const cm=val.match(/^\{color\.(.+)\}$/);
  if(cm){const k=cm[1];if(primitiveMap[k])return primitiveMap[k];if(semanticRefMap[k])return resolveRef(semanticRefMap[k]);return val;}
  const sm=val.match(/^\{state\.(.+)\}$/);
  if(sm&&semanticRefMap['state.'+sm[1]])return resolveRef(semanticRefMap['state.'+sm[1]]);
  return val;
}
function isRgba(v){return v&&v.startsWith('rgba')}

/* ═══════ Theme ═══════════════════════════════════════════ */
function getTheme(){return document.documentElement.dataset.theme||'light'}
function setTheme(t){document.documentElement.dataset.theme=t;renderChrome();renderSidebar();renderPage()}
function toggleTheme(){setTheme(getTheme()==='light'?'dark':'light')}

/* ═══════ Mobile sidebar ══════════════════════════════════ */
function openSidebar(){$('#sidebar').classList.add('open');$('#sidebarBackdrop').classList.add('open');document.body.classList.add('sidebar-open')}
function closeSidebar(){$('#sidebar').classList.remove('open');$('#sidebarBackdrop').classList.remove('open');document.body.classList.remove('sidebar-open')}
$('#hamburger').addEventListener('click',()=>{const sb=$('#sidebar');sb.classList.contains('open')?closeSidebar():openSidebar()});
$('#sidebarBackdrop').addEventListener('click',closeSidebar);

function getRoute(){return location.hash.slice(1)||'documentation'}
function navigate(route){location.hash=route;closeSidebar()}
window.addEventListener('hashchange',()=>{renderSidebar();renderPage()});

/* ═══════ Build token maps ════════════════════════════════ */
const PRIM_KEYS=['neutral','primary','info','success','warning','danger','additional','opacity'];
function buildMaps(t){
  primitiveMap={};semanticRefMap={};
  function walkP(obj,pre){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;if(!PRIM_KEYS.includes(pre.split('.')[0])&&pre)return;if(v&&v.$value!==undefined&&typeof v.$value==='string'&&(v.$value.startsWith('#')||v.$value.startsWith('rgba'))){primitiveMap[pre+k]=v.$value}else if(typeof v==='object'&&v!==null&&!v.$value){walkP(v,pre+k+'.')}}}
  for(const k of PRIM_KEYS)if(t.color[k])walkP(t.color[k],k+'.');
  function walkS(obj,pre){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;const p=pre?pre+'.'+k:k;if(v&&v.$value&&typeof v.$value==='string'){semanticRefMap[p]=v.$value}else if(typeof v==='object'&&v!==null&&!Array.isArray(v)&&!v.$type){walkS(v,p)}}}
  for(const k of['surface','text','border','intent','overlay'])if(t.color[k])walkS(t.color[k],k);
  if(t.color.component)walkS(t.color.component,'component');
  if(t.state){(function ws(obj,pre){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;const p=pre?pre+'.'+k:k;if(v&&v.$value!==undefined&&typeof v.$value==='string')semanticRefMap['state.'+p]=v.$value;else if(typeof v==='object'&&v!==null&&!v.$type)ws(v,p)}})(t.state,'')}
}

/* ═══════ Sidebar ═════════════════════════════════════════ */
function renderSidebar(){
  const sb=$('#sidebar');const route=getRoute();sb.innerHTML='';
  const nav=h('nav',{class:'sidebar-nav'});
  const chevron=open=>'<svg class="chevron'+(open?' open':'')+'" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>';
  const topItem=(label,active,onClick,withChevron=false,open=false)=>{
    const item=h('div',{class:'nav-item'+(active?' active':''),onclick:onClick});
    item.appendChild(document.createTextNode(label));
    if(withChevron)item.innerHTML+=chevron(open);
    return item;
  };
  const childItem=(label,active,onClick,cls='nav-child')=>h('div',{class:cls+(active?' active':''),onclick:onClick},label);

  nav.appendChild(topItem('Documentation',route.startsWith('documentation')||route.startsWith('changelog'),()=>navigate('documentation')));

  const tokensOpen=route.startsWith('tokens');
  nav.appendChild(topItem('Tokens',tokensOpen,()=>{if(tokensOpen)navigate('documentation');else navigate('tokens/color')},true,tokensOpen));
  const tokensCh=h('div',{class:'nav-children'+(tokensOpen?' open':'')});
  for(const[label,hash]of[['Color','tokens/color'],['Shadows','tokens/shadow'],['Typography','tokens/typography'],['Layout','tokens/layout'],['Space','tokens/space']]){
    tokensCh.appendChild(childItem(label,route.startsWith(hash),()=>navigate(hash)));
  }
  nav.appendChild(tokensCh);

  const compsOpen=route.startsWith('components');
  nav.appendChild(topItem('Components',compsOpen,()=>{if(compsOpen)navigate('documentation');else navigate('components')},true,compsOpen));
  const compsCh=h('div',{class:'nav-children'+(compsOpen?' open':'')});
  for(const c of COMPONENTS){
    const slug=c.toLowerCase().replace(/\s+/g,'-');
    compsCh.appendChild(childItem(c,route==='components/'+slug,()=>navigate('components/'+slug),'nav-child-component'));
  }
  nav.appendChild(compsCh);
  sb.appendChild(nav);
}

/* ═══════ Page: Documentation ═════════════════════════════ */
/* ── doc helpers ─────────────────────────────────── */
function slugifyDocId(prefix,title){
  return `${prefix}-${title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')}`;
}
function docSection(card,title,prefix='doc'){
  const id=slugifyDocId(prefix,title);
  card.appendChild(h('div',{class:'doc-section-title',id},title));
  return id;
}
function docBlock(card,title,text){const b=h('div',{class:'doc-block'});b.appendChild(h('div',{class:'doc-block-title'},title));b.appendChild(h('div',{class:'doc-text'},text));card.appendChild(b)}
function docList(card,items){const ul=h('ul',{class:'changelog-list',style:{marginTop:'8px'}});items.forEach(i=>ul.appendChild(h('li',{},i)));card.appendChild(ul)}
function setActiveTocItem(aside,id){
  for(const item of aside.querySelectorAll('.toc-item[data-target]')){
    item.classList.toggle('active',item.dataset.target===id);
  }
}
function scrollToDocTarget(id,aside){
  const target=document.getElementById(id);
  if(!target)return;
  target.scrollIntoView({behavior:'smooth',block:'start'});
  if(aside)setActiveTocItem(aside,id);
}
function setupDocToc(aside){
  const items=[...aside.querySelectorAll('.toc-item[data-target]')];
  const targets=items.map(item=>document.getElementById(item.dataset.target)).filter(Boolean);
  if(!items.length||!targets.length)return;
  setActiveTocItem(aside,items[0].dataset.target);
  const observer=new IntersectionObserver(entries=>{
    const visible=entries
      .filter(entry=>entry.isIntersecting)
      .sort((a,b)=>a.boundingClientRect.top-b.boundingClientRect.top)[0];
    if(!visible)return;
    setActiveTocItem(aside,visible.target.id);
  },{rootMargin:'-120px 0px -65% 0px',threshold:0});
  targets.forEach(target=>observer.observe(target));
}

function renderDocumentation(){
  const route=getRoute();
  const tab=route==='documentation/technical'?'technical':route==='changelog'?'changelog':'guides';
  const m=$('#main');m.innerHTML='';
  const inner=h('div',{class:'main-inner'});
  inner.appendChild(h('h1',{class:'page-title'},'Documentation'));
  inner.appendChild(mkTabs([['Guides','documentation'],['Technical Docs','documentation/technical'],['Changelog','changelog']],(tab==='guides'?'documentation':tab==='technical'?'documentation/technical':'changelog')));

  if(tab==='guides'){
    renderGuides(inner);
  } else if(tab==='technical'){
    renderTechnicalDocs(inner);
  } else {
    renderChangelog(inner);
  }
  m.appendChild(inner);
}

/* ═══════ Tab: Technical Documentation ════════════════════ */
function renderTechnicalDocs(inner){
  const row=h('div',{class:'content-row'});
  const card=h('div',{class:'card content-main'});
  const sectionTitles=['Token Architecture','Naming & Components','States & Theming','Typography & Extension','Governance & AI'];

  card.appendChild(h('div',{class:'doc-title'},'Technical Documentation'));
  card.appendChild(h('div',{class:'doc-subtitle'},'Infrastructure reference for the DLS-Lead 4-layer token system. Covers architecture, naming, components, states, theming, typography, extensions, and governance.'));

  /* ── Token Architecture ─────────────── */
  docSection(card,'Token Architecture','technical');
  docBlock(card,'4-Layer Model','DLS-Lead uses a 4-layer DTCG-compliant token system. Every visual decision is encoded as a design token. Components consume tokens \u2014 they never hardcode values.');
  docBlock(card,'Layer 1 \u2014 Primitives','Raw values: hex colors, pixel dimensions, font weights, numeric scales.\n\nExamples:\ncolor.neutral.700 \u2192 #414651\nradius.m \u2192 6px\nspacing.4 \u2192 16px\ntext.m.fontSize \u2192 14px\n\nRule: NEVER referenced directly by components.');
  docBlock(card,'Layer 2 \u2014 System Semantics','UI roles mapped from primitives. Define meaning, not appearance.\n\nExamples:\ncolor.surface.base \u2192 {color.neutral.0}\ncolor.text.primary \u2192 {color.neutral.900}\ncolor.intent.primary.base \u2192 {color.primary.700}\n\nUsed by components when no Layer 4 token exists.');
  docBlock(card,'Layer 3 \u2014 State Abstraction','Behavioral modifiers independent of brand color.\n\nCode: OKLCH lightness shift\nstate.lDelta.hover \u2192 -0.05\nstate.lDelta.pressed \u2192 -0.10\n\nFigma: opacity overlays\nstate.overlay.hover.light \u2192 rgba(0,0,0,0.05)\nstate.overlay.pressed.light \u2192 rgba(0,0,0,0.10)\n\nstate.disabled.opacity \u2192 0.38\nstate.focus.ring.color \u2192 {color.info.300}');
  docBlock(card,'Layer 4 \u2014 Component Tokens','Override-safe, per-component values. Primary source for all component CSS.\n\nExamples:\ncolor.component.button.primary.bg.base\ncolor.component.badge.danger.fg\nradius.component.card \u2192 {radius.xl} (12px)\nradius.component.button \u2192 {radius.m} (6px)\n\nComponents MUST use Layer 4 tokens first.');
  docBlock(card,'Dependency Rules','References flow downward only:\nLayer 4 \u2192 can reference Layers 3, 2, 1\nLayer 3 \u2192 can reference Layers 2, 1\nLayer 2 \u2192 can reference Layer 1 only\nLayer 1 \u2192 raw values only, no references\n\nA lower layer MUST NOT reference a higher layer.');
  docBlock(card,'Component Lookup Order','1. Check: does --dls-color-component-{name}-{property}-{state} exist? \u2192 Use it.\n2. Check: does --dls-color-{semantic}-{role} exist? \u2192 Use it.\n3. No match? \u2192 Request a new token. Do NOT hardcode.\n\nThis order is mandatory for both human developers and AI agents.');
  docBlock(card,'Anti-Patterns','\u2717 Using #hex or rgb() values in component CSS\n\u2717 Referencing color.neutral.700 (primitive) in a component\n\u2717 Referencing color.intent.primary.base when color.component.button.primary.bg.base exists\n\u2717 Hardcoding state shift values instead of using state.lDelta tokens\n\u2717 Layer 4 token referencing another Layer 4 token');

  /* ── Naming & Components ────────────── */
  docSection(card,'Naming & Components','technical');
  docBlock(card,'Token Path Format','category.scope.element.variant.property.state\nEach segment is lowercase. Hyphens within a segment, dots between segments.\n\nCSS Variable Format:\nAll tokens expand as --dls-{path with dots replaced by hyphens}\ncolor.neutral.700 \u2192 --dls-color-neutral-700\ncolor.intent.primary.base \u2192 --dls-color-intent-primary-base');
  docBlock(card,'Fixed Enums','Intents: neutral, primary, info, success, warning, danger\nStates: base, hover, pressed, focus, disabled, active, selected\nSizes: xs, s, m, l, xl, 2xl, 3xl\nVariants: filled, outline, soft, ghost, dotted, ghost, link\n\nDo not invent new names. Use only these enums.');
  docBlock(card,'Naming Anti-Patterns','\u2717 camelCase in CSS: --dls-colorIntentPrimaryBase\n\u2717 Abbreviated scope: --dls-btn-bg\n\u2717 Mixed layer concerns: --dls-color-border-neutral-700\n\u2717 Generic names: --dls-color-1, --dls-blue\n\n\u2713 Correct: --dls-color-component-button-primary-bg-base');
  docBlock(card,'Component CSS Model','Base Structure \u2014 every DLS component starts with:\n\n.dls-component {\n  all: unset;\n  box-sizing: border-box;\n  /* Internal variables per intent */\n  --_base: var(--dls-color-intent-neutral-on-base);\n  --_subtle: var(--dls-color-intent-neutral-subtle);\n  --_text: var(--dls-color-intent-neutral-text);\n  --_border: var(--dls-color-intent-neutral-border);\n}');
  docBlock(card,'Attribute Model','Components use data-* attributes for all dynamic properties:\ndata-variant="filled|outline|soft|dotted|ghost|link"\ndata-intent="neutral|primary|info|success|warning|danger"\ndata-size="xs|s|m|l|xl"\ndata-icon-only (presence attribute)\n:disabled (native HTML)\n\nNo .is-* or .has-* classes. No class-based state management.');

  /* ── States & Theming ───────────────── */
  docSection(card,'States & Theming','technical');
  docBlock(card,'Interaction States','Hover: OKLCH lightness shift\nbackground: oklch(from var(--_base) calc(l + var(--dls-state-l-delta-hover)) c h)\n\nFigma: Opacity overlay layer\nstate.overlay.hover.light \u2192 rgba(0, 0, 0, 0.05)\n\nFilled/soft/ghost variants use the same formula.');
  docBlock(card,'Pressed','Code: color L-shift with state.lDelta.pressed (-0.10)\nFigma: state.overlay.pressed.light = rgba(0, 0, 0, 0.10)');
  docBlock(card,'Focus','Applied via :focus-visible only (keyboard navigation).\nBorder: 0 0 0 3px var(--dls-state-focus-ring-color)\nColor: state.focus.ring.color \u2192 {color.info.300}\n\nNon-filled variants get background: var(--dls-color-surface-base) on focus to ensure contrast.\nUse box-shadow, not outline, to respect border-radius.');
  docBlock(card,'Disabled','Background: --dls-color-surface-disabled\nForeground: --dls-color-text-disabled\nBorder: --dls-color-border-disabled\nCursor: not-allowed\nOpacity: state.disabled.opacity = 0.38\n\nAlways use :hover:not(:disabled) and guard hover/pressed with :not(:disabled).\nUse :focus-visible, never :focus.\nUse box-shadow for focus ring.');
  docBlock(card,'Light Theme (Default)','All tokens in tokens.json define light-theme values. The root scope in tokens.css is the light theme.');
  docBlock(card,'Dark Theme','Applied via [data-theme="dark"] selector overriding CSS variables.\nStrategy: Override Layer 2 semantic tokens only.\n\n[data-theme="dark"] {\n  --dls-color-surface-base: var(--dls-color-neutral-900);\n  --dls-color-surface-primary: var(--dls-color-neutral-92);\n  --dls-color-border-base: var(--dls-color-neutral-700);\n}\n\nComponents auto-update because they reference semantic tokens.');

  /* ── Typography & Extension ─────────── */
  docSection(card,'Typography & Extension','technical');
  docBlock(card,'Font Stack','Font family: Inter\nWeights: normal (400), medium (500), semibold (600), bold (800), black (900)');
  docBlock(card,'Primitive Text Scale','xs: 10/14, s: 12/16, m: 14/20, l: 16/24, xl: 18/28, 2xl: 24/32, 3xl: 32/40, hero: 36/46\n\nFormat: fontSize/lineHeight in pixels');
  docBlock(card,'Semantic Categories','Heading: hero, h1\u2013h6\nParagraph: m \u2014 light/medium/heavy\nButton: 1/m/xs (xl weight 500)\nLink: 1/m/xs \u2014 light/medium/heavy\nUpper: 1/m/xs (uppercase, 2% letter-spacing)\nItalic: 1/m/xs (font-style: italic)\nAvatar: 2xl through 5xs (line-height = font-size)');
  docBlock(card,'Extension Guide','Adding a New Component:\n1. Define radius: radius.component.{name}\n2. Define colors: color.component.{name}.bg/fg/border.{state}\n3. Regenerate outputs (CSS, SCSS, TS)\n4. Create component CSS with all reset patterns\n5. Add Storybook story\n\nAdding a New Intent:\n1. Add color.{name}.{numeral} (even) (a-step: 100/300/500/700)\n2. For intent use: promote to full 11-stop scale\n3. Add data-intent support to components\n4. Regenerate all output files');
  docBlock(card,'Versioning','Patch (0.0.x): Value adjustments within existing tokens\nMinor (0.x.0): New tokens, components, intents, scales. No removals.\nMajor (x.0.0): Removed tokens, renamed tokens, structural changes.\n\nBreaking Change Rules:\n\u2022 Add new + Minor (for old, action needed)\n\u2022 Change token value = Patch (document in changelog)\n\u2022 Rename token = Major (deprecate for 2 Minors first)\n\u2022 Remove token = Major (deprecate for 2 Minors first)\n\u2022 Change layer assignment = Major (full migration guide)\n\u2022 Add new variant = Minor');

  /* ── Governance & AI ────────────────── */
  docSection(card,'Governance & AI','technical');
  docBlock(card,'Token Lifecycle','Stages: PROPOSED \u2192 EXPERIMENTAL \u2192 STABLE \u2192 DEPRECATED \u2192 REMOVED\n\nProposed: Exists in discussion/Figma only. Not in tokens.json.\nExperimental: In tokens.json with [experimental] tag. May change.\nStable: At least 2 Minor versions, or documented \"used broadly\".\nDeprecated: [deprecated: use {replacement}] in $description. Must remain for 2 Minor versions.\nRemoved: Deleted. Requires major version bump.');
  docBlock(card,'Modification Rules','What You Can Do:\n\u2022 Override Layer 4 tokens per-brand\n\u2022 Add new component tokens\n\u2022 Adjust primitive values (affects entire system)\n\u2022 Add dark-mode overrides to Layer 2\n\u2022 Add new intents with full 6-property set\n\nWhat You MUST Not Do:\n\u2022 Override system-level primitives for a single component\n\u2022 Create component tokens that skip Layer 2 semantics\n\u2022 Adjust primitive values expecting local effect\n\u2022 Put dark-mode logic inside component CSS\n\u2022 Create tokens that reference higher layers');
  docBlock(card,'AI Integration Guide','How AI Should Reference Tokens:\n1. Read tokens.json before generating any CSS\n2. Identify which Layer 4 tokens exist for the target component\n3. Use CSS custom properties, never raw values\n4. Use internal variable pattern (--_base, --_on-base, etc.) for intent-driven components\n\nHow AI Should Generate Components:\n1. Parse tokens for available tokens\n2. Generate Layer 4 token entries first\n3. Generate CSS referencing only those tokens\n4. Use data-* attributes for variants/intents/sizes\n5. Start with: all: unset; box-sizing: border-box;\n6. Include all states: base, hover, pressed, focus-visible, disabled\n7. Test against all 6 intents\n\nProhibited Actions:\n\u2717 Using #hex or rgb() in component CSS\n\u2717 Using primitives (var(--dls-color-neutral-700)) in components\n\u2717 Generating inline styles with token values\n\u2717 Skipping disabled state\n\u2717 Using :focus instead of :focus-visible\n\u2717 Using outline for focus ring\n\u2717 Adding .is-* or .has-* classes\n\u2717 Deleting all: unset on new components');

  row.appendChild(card);

  // TOC sidebar
  const aside=h('div',{class:'card-sm content-aside'});
  for(const [index,title] of sectionTitles.entries()){
    const target=slugifyDocId('technical',title);
    aside.appendChild(h('button',{class:'toc-item'+(index===0?' active':''),type:'button','data-target':target,onclick:()=>scrollToDocTarget(target,aside)},title));
  }
  row.appendChild(aside);
  inner.appendChild(row);
  setupDocToc(aside);
}

/* ═══════ Tab: Changelog (synced from git) ════════════════ */
let changelogData=null;
async function loadChangelog(){
  if(changelogData)return changelogData;
  try{const r=await fetch('/changelog.json');changelogData=await r.json();return changelogData}
  catch(e){return null}
}

function renderChangelog(inner){
  const row=h('div',{class:'content-row'});
  const card=h('div',{class:'card content-main'});
  card.appendChild(h('div',{class:'doc-title'},'Changelog'));
  card.appendChild(h('div',{class:'doc-subtitle'},'Release history synced from Git commits. Run: node scripts/generate-changelog.mjs --write'));

  // Show loading then fill async
  const placeholder=h('p',{style:{color:'#666970',fontSize:'14px'}},'Loading commits...');
  card.appendChild(placeholder);

  loadChangelog().then(data=>{
    placeholder.remove();
    if(!data||data.length===0){
      card.appendChild(h('p',{style:{color:'#666970',fontSize:'14px'}},'No changelog data found. Run: node scripts/generate-changelog.mjs --write'));
      return;
    }
    for(const group of data){
      const entry=h('div',{class:'changelog-entry',id:slugifyDocId('changelog',group.month)});
      entry.appendChild(h('div',{class:'changelog-date'},group.month));
      const ul=h('ul',{class:'changelog-list'});
      for(const c of group.commits){
        const li=h('li',{});
        li.appendChild(h('code',{style:{fontSize:'12px',background:'#F5F5F5',padding:'2px 6px',borderRadius:'4px',marginRight:'8px',fontFamily:"'JetBrains Mono',monospace",color:'#535862'}},c.hash));
        li.appendChild(h('span',{style:{color:'#666970',fontSize:'12px',marginRight:'8px'}},c.date));
        li.appendChild(document.createTextNode(c.message));
        ul.appendChild(li);
      }
      entry.appendChild(ul);
      card.appendChild(entry);
    }
  });

  row.appendChild(card);
  // Sidebar with month list
  const aside=h('div',{class:'card-sm content-aside'});
  loadChangelog().then(data=>{
    aside.innerHTML='';
    if(data){
      for(let i=0;i<data.length;i++){
        const target=slugifyDocId('changelog',data[i].month);
        aside.appendChild(h('button',{class:'toc-item'+(i===0?' active':''),type:'button','data-target':target,onclick:()=>scrollToDocTarget(target,aside)},data[i].month));
      }
      setupDocToc(aside);
    }
  });
  aside.appendChild(h('button',{class:'toc-item active',type:'button'},'Loading...'));
  row.appendChild(aside);
  inner.appendChild(row);
}

  }

/* ═══════ Page: Component Detail ═════════════════════════ */
function renderComponentDetail(slug){
  const name=COMPONENTS.find(c=>c.toLowerCase().replace(/\s+/g,'-')===slug)||slug;
  const data=COMP_DATA[slug];
  const m=$('#main');m.innerHTML='';
  const inner=h('div',{class:'main-inner'});
  inner.appendChild(h('h1',{class:'page-title'},'Components. '+name));
  const card=h('div',{class:'component-page-content'});
  const intro=mkTokenPageSection(name,data&&data.desc?data.desc:'');
  card.appendChild(intro);

  if(data){
    // Storybook link button
    if(data.storybook){
      const sbLink=h('a',{
        href:'https://storybook.dlslead.com/?path=/story/'+data.storybook+'--playground',
        target:'_blank',
        class:'btn-outline',
        style:{display:'inline-flex',gap:'8px',fontSize:'13px',padding:'8px 14px'},
        html:ICO.storybook+' <span>View in Storybook</span>'
      });
      intro.appendChild(sbLink);
    }

    // Alert-specific visual preview
    if(slug==='alert'){
      const preview=h('div',{class:'alert-preview component-preview-shell'});
      const intents=[
        {name:'neutral',bg:'#F5F5F5',fg:'#1C1D1F',btnBg:'#1C1D1F',icon:ICO.info},
        {name:'primary',bg:'#F9F5FF',fg:'#6941C6',btnBg:'#6941C6',icon:ICO.info},
        {name:'info',bg:'#EFF8FF',fg:'#175CD3',btnBg:'#175CD3',icon:ICO.info},
        {name:'success',bg:'#ECFDF3',fg:'#067647',btnBg:'#067647',icon:ICO.check},
        {name:'warning',bg:'#FFFAEB',fg:'#B54708',btnBg:'#B54708',icon:ICO.warn},
        {name:'danger',bg:'#FEF3F2',fg:'#B42318',btnBg:'#B42318',icon:ICO.danger},
      ];
      for(const intent of intents){
        const row=h('div',{class:'alert-row',style:{background:intent.bg,color:intent.fg}});
        row.innerHTML='<span class="alert-icon">'+intent.icon+'</span>';
        row.appendChild(h('div',{class:'alert-content'},
          h('div',{class:'alert-title'},'Alert title'),
          h('div',{class:'alert-desc'},'This is alert description'),
        ));
        row.appendChild(h('button',{class:'alert-btn',style:{background:intent.btnBg}},'Button'));
        preview.appendChild(row);
      }
      card.appendChild(preview);
    }

    // Code snippet
    if(data.code){
      const cb=h('div',{class:'code-block',style:{marginTop:'24px'}});
      const hdr=h('div',{class:'code-block-header'});
      hdr.innerHTML=ICO.file+'<span class="filename">'+name+'</span>';
      const copyBtn=h('span',{class:'copy-btn',style:{cursor:'pointer'},onclick:()=>{navigator.clipboard.writeText(data.code);const t=$('#toast');t.textContent='Code copied!';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800)}});
      copyBtn.innerHTML=ICO.copy;
      hdr.appendChild(copyBtn);
      cb.appendChild(hdr);
      cb.appendChild(h('pre',{class:'code-block-body',style:{whiteSpace:'pre-wrap',fontSize:'12px',lineHeight:'18px',color:'#666970'}},data.code));
      card.appendChild(cb);
    }

    // Component tokens section
    if(tokens&&tokens.color&&tokens.color.component){
      // Map slug → token key (e.g. 'input-field' → 'input', 'alert-dialog' → 'dialog')
      const tokenKeyMap={'input-field':'input','alert-dialog':'dialog','list-item':'table','form-field':'input','search-field':'input','top-bar':'tab','badge-indicator':'badge','badge-number':'badge'};
      const compKey=tokenKeyMap[slug]||slug.replace(/-/g,'');
      const compTokens=tokens.color.component[compKey];
      if(compTokens){
        const tokenSection=mkTokenPageSection('Component Tokens','Layer 4 — Override-safe tokens for this component.');
        const table=h('table',{class:'token-table'});
        table.appendChild(h('thead',{},h('tr',{},h('th',{},''),h('th',{},'Token'),h('th',{},'Reference'),h('th',{},'CSS Variable'))));
        const tbody=h('tbody');
        (function walk(obj,prefix){
          for(const[k,v]of Object.entries(obj)){
            if(k.startsWith('$'))continue;
            const path=prefix?prefix+'.'+k:k;
            if(v&&v.$value&&typeof v.$value==='string'){
              const resolved=resolveRef(v.$value);
              const cssVar='var(--dls-color-component-'+compKey+'-'+path.replace(/\./g,'-')+')';
              tbody.appendChild(h('tr',{onclick:()=>copyToast(cssVar),style:{cursor:'pointer'}},
                h('td',{},h('span',{class:'swatch',style:{background:resolved}})),
                h('td',{class:'mono'},path),
                h('td',{class:'ref'},v.$value.replace(/[{}]/g,'')),
                h('td',{class:'css-var'},cssVar)
              ));
            } else if(typeof v==='object'&&v!==null&&!v.$type){
              walk(v,path);
            }
          }
        })(compTokens,'');
        table.appendChild(tbody);
        if(tbody.children.length>0){tokenSection.appendChild(wrapTable(table));card.appendChild(tokenSection);}
      }
    }
  } else {
    intro.appendChild(h('p',{class:'section-desc'},'Component documentation coming soon.'));
  }

  inner.appendChild(card);
  m.appendChild(inner);
}

function mkColorPageSection(title,desc){
  const section=h('section',{class:'color-page-section'});
  const heading=h('div',{class:'color-page-heading'});
  heading.appendChild(h('div',{class:'color-page-title'},title));
  if(desc)heading.appendChild(h('p',{class:'color-page-desc'},desc));
  section.appendChild(heading);
  return section;
}

function mkTokenPageSection(title,desc){
  const section=h('section',{class:'token-page-section'});
  const header=h('div',{class:'token-page-header'});
  header.appendChild(h('div',{class:'section-heading'},title));
  if(desc)header.appendChild(h('p',{class:'section-desc'},desc));
  section.appendChild(header);
  return section;
}

function mkTokenTableGroup(title){
  const group=h('div',{class:'token-table-group'});
  group.appendChild(h('div',{class:'subsection-title'},title));
  return group;
}

function wrapTable(table){
  return h('div',{class:'table-scroll'},table);
}

function mkColorScaleGroup(title,items,minCell,checker=false){
  const group=h('div',{class:'token-scale-group'});
  group.appendChild(h('div',{class:'token-scale-title'},title));
  const shell=h('div',{class:'token-scale-shell'});
  const board=h('div',{class:'token-scale-board',style:{gridTemplateColumns:`repeat(${items.length}, minmax(0, 1fr))`,'--mobile-cols':String(Math.min(items.length,4))}});
  for(const item of items){
    const card=h('div',{class:'color-swatch-card',onclick:()=>copyToast(item.copy||item.value)});
    const surface=h('div',{class:'color-swatch-surface'+(checker?' checker':''),style:checker?{}:{background:item.value}});
    if(checker)surface.appendChild(h('div',{class:'fill',style:{background:item.value}}));
    card.appendChild(surface);
    card.appendChild(h('div',{class:'color-swatch-meta'},
      h('div',{class:'color-swatch-token'},item.label),
      h('div',{class:'color-swatch-value'},item.valueLabel||item.value)
    ));
    board.appendChild(card);
  }
  shell.appendChild(board);
  group.appendChild(shell);
  return group;
}

function mkColorTokenTable(rows,{includeDescription=true}={}){
  const table=h('table',{class:'token-table color-token-table'});
  table.appendChild(h('colgroup',{},
    h('col',{class:'swatch-col'}),
    h('col',{class:'token-col'}),
    h('col',{class:'reference-col'}),
    h('col',{class:'resolved-col'}),
    h('col',{class:'css-col'}),
    ...(includeDescription?[h('col',{class:'desc-col'})]:[])
  ));
  table.appendChild(h('thead',{},h('tr',{},
    h('th',{},''),
    h('th',{},'Token'),
    h('th',{},'Reference'),
    h('th',{},'Resolved'),
    h('th',{},'CSS Variable'),
    ...(includeDescription?[h('th',{},'Description')]:[])
  )));
  const tbody=h('tbody');
  for(const row of rows){
    tbody.appendChild(h('tr',{onclick:()=>copyToast(row.cssVar),style:{cursor:'pointer'}},
      h('td',{class:'swatch-cell'},h('span',{class:'swatch',style:{background:row.resolved}})),
      h('td',{class:'mono'},row.token),
      h('td',{class:'ref'},row.reference),
      h('td',{class:'ref'},row.resolved),
      h('td',{class:'css-var'},row.cssVar),
      ...(includeDescription?[h('td',{class:'desc'},row.description||'')]:[])
    ));
  }
  table.appendChild(tbody);
  return table;
}

function renderTokensColor(){
  const route=getRoute();const tab=route.includes('/semantics')?'semantics':route.includes('/components')?'components':'primitives';
  const m=$('#main');m.innerHTML='';
  const inner=h('div',{class:'main-inner'});
  inner.appendChild(h('h1',{class:'page-title'},'Tokens. Color'));
  inner.appendChild(mkTabs([['Primitives','tokens/color'],['Semantics','tokens/color/semantics'],['Components','tokens/color/components']],'tokens/color'+(tab==='primitives'?'':'/'+tab)));
  const card=h('div',{class:'color-page-content'});

  if(tab==='primitives'){
    const baseSection=mkColorPageSection('Primitives. Base','The base palette of raw color values. Not tied to any UI meaning — they form the foundation for semantic colors and themes.');
    for(const name of['neutral','primary','info','success','warning','danger']){
      const scale=tokens.color[name];if(!scale)continue;
      const items=[];
      for(const[step,def]of Object.entries(scale)){
        if(step.startsWith('$'))continue;const hex=def&&def.$value;if(!hex||typeof hex!=='string')continue;
        items.push({label:name+'.'+step,value:hex});
      }
      if(items.length)baseSection.appendChild(mkColorScaleGroup(name[0].toUpperCase()+name.slice(1),items,92,false));
    }
    card.appendChild(baseSection);
    // Additional
    const additionalSection=mkColorPageSection('Primitives. Additional','Supporting colors used indirectly in the UI to emphasize specific meanings, states, or categories not covered by core brand colors.');
    const columns=h('div',{class:'color-page-columns'});
    const addEntries=Object.entries(tokens.color.additional||{}).filter(([n])=>!n.startsWith('$'));
    for(const [name,scale] of addEntries){
      const items=[];
      for(const[step,def]of Object.entries(scale)){if(step.startsWith('$'))continue;const hex=def.$value;items.push({label:name+'.'+step,value:hex});}
      if(items.length)columns.appendChild(mkColorScaleGroup(name[0].toUpperCase()+name.slice(1),items,123,false));
    }
    additionalSection.appendChild(columns);
    card.appendChild(additionalSection);
    // Opacity
    const opacitySection=mkColorPageSection('Primitives. Opacity','Light and dark overlay colors based on white and black, using fixed opacity steps. Use for overlays, hover/pressed states, scrims, and subtle UI layers.');
    for(const[name,scale]of Object.entries(tokens.color.opacity||{})){
      if(name.startsWith('$')||(name!=='light'&&name!=='dark'))continue;
      const items=[];
      for(const[step,def]of Object.entries(scale)){if(step.startsWith('$'))continue;const val=def.$value;if(typeof val!=='string')continue;items.push({label:'opacity.'+name+'.'+step,value:val,valueLabel:val});}
      if(items.length)opacitySection.appendChild(mkColorScaleGroup(name[0].toUpperCase()+name.slice(1)+(name==='light'?' (white-based)':' (black-based)'),items,253,true));
    }
    card.appendChild(opacitySection);
  } else if(tab==='semantics'){
    const semanticsSection=mkColorPageSection('Semantic Colors','Layer 2 — System semantics map primitives to UI roles.');
    const groups=[{name:'Surface',path:'surface',obj:tokens.color.surface},{name:'Text',path:'text',obj:tokens.color.text},{name:'Border',path:'border',obj:tokens.color.border},{name:'Overlay',path:'overlay',obj:tokens.color.overlay}];
    if(tokens.color.intent)for(const[n,o]of Object.entries(tokens.color.intent)){if(!n.startsWith('$'))groups.push({name:'Intent \u2014 '+n[0].toUpperCase()+n.slice(1),path:'intent.'+n,obj:o})}
    for(const g of groups){
      if(!g.obj)continue;const sub=h('div',{class:'token-scale-group'});sub.appendChild(h('div',{class:'token-scale-title'},g.name));
      const rows=[];
      for(const[name,def]of Object.entries(g.obj)){
        if(name.startsWith('$'))continue;const tp=g.path+'.'+name;const ref=def.$value||'';const resolved=typeof ref==='string'?resolveRef(ref):ref;const cssVar='var(--dls-color-'+tp.replace(/\./g,'-')+')';
        rows.push({token:'color.'+tp,reference:String(ref).replace(/[{}]/g,''),resolved,cssVar,description:def.$description||''});
      }
      sub.appendChild(wrapTable(mkColorTokenTable(rows)));semanticsSection.appendChild(sub);
    }
    card.appendChild(semanticsSection);
  } else {
    const componentSection=mkColorPageSection('Component Tokens','Layer 4 — Override-safe tokens per component.');
    if(tokens.color.component){
      const leaves=[];
      (function cl(obj,p){for(const[k,v]of Object.entries(obj)){if(k.startsWith('$'))continue;const fp=p?p+'.'+k:k;if(v&&v.$value!==undefined&&typeof v.$value==='string')leaves.push({path:fp,ref:v.$value,desc:v.$description||''});else if(typeof v==='object'&&v!==null&&!v.$type)cl(v,fp)}})(tokens.color.component,'component');
      const byComp={};for(const i of leaves){const t=i.path.split('.')[1];if(!byComp[t])byComp[t]=[];byComp[t].push(i)}
      for(const cn of Object.keys(byComp).sort()){
        const items=byComp[cn];const sub=h('div',{class:'token-scale-group'});sub.appendChild(h('div',{class:'token-scale-title'},cn[0].toUpperCase()+cn.slice(1)));
        const rows=[];
        for(const i of items){const resolved=resolveRef(i.ref);const cssVar='var(--dls-color-'+i.path.replace(/\./g,'-')+')';
          rows.push({token:'color.'+i.path,reference:i.ref.replace(/[{}]/g,''),resolved,cssVar,description:i.desc||''});}
        sub.appendChild(wrapTable(mkColorTokenTable(rows,{includeDescription:false})));componentSection.appendChild(sub);
      }
    }
    card.appendChild(componentSection);
  }
  inner.appendChild(card);m.appendChild(inner);
}

/* ═══════ Router dispatch ═════════════════════════════════ */
function renderPage(){
  const route=getRoute();
  if(route.startsWith('changelog')||route.startsWith('documentation'))renderDocumentation();
  else if(route==='components')renderComponentsIndex();
  else if(route.startsWith('components/'))renderComponentDetail(route.split('/')[1]);
  else if(route.startsWith('tokens/color'))renderTokensColor();
  else if(route.startsWith('tokens/shadow'))renderTokensShadow();
  else if(route.startsWith('tokens/typography'))renderTokensTypography();
  else if(route.startsWith('tokens/layout')||route.startsWith('tokens/space'))renderTokensLayout();
  else renderDocumentation();
  window.scrollTo(0,0);
}

/* ═══════ Init ════════════════════════════════════════════ */
async function init(){
  const res=await fetch('/tokens/tokens.json');
  tokens=await res.json();
  buildMaps(tokens);
  renderChrome();
  renderSidebar();
  renderPage();
}
init();
